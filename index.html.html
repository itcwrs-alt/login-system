<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surprise Lamp Login Reveal</title>
    <style>
        :root {
            --wall-color: #11141a; /* शुरू में बहुत गहरा अंधेरा */
            --floor-color: #251815;
            --form-visibility: hidden;
            --form-opacity: 0;
            --form-transform: translateY(30px); /* शुरू में फॉर्म थोड़ा नीचे छुपा रहेगा */
            --light-opacity: 0;
        }

        /* 💡 जैसे ही डोरी खिंचेगी (Checkबॉक्स टिक होगा), पूरा रूम और फॉर्म एक्टिव हो जाएगा */
        #light-trigger:checked ~ body,
        #light-trigger:checked ~ .container .light-beam,
        #light-trigger:checked ~ .container .login-card {
            --wall-color: #2c3e50; /* लाइट ऑन होने पर दीवार का सुंदर कलर */
            --floor-color: #3d2723;
            --light-opacity: 1;
            --form-visibility: visible;
            --form-opacity: 1;
            --form-transform: translateY(0); /* तैरता हुआ अपनी जगह पर आएगा */
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: linear-gradient(to bottom, var(--wall-color) 75%, var(--floor-color) 75%);
            transition: background 0.5s ease;
        }

        /* छुपा हुआ स्विच */
        #light-trigger { display: none; }

        .container {
            display: flex; position: relative;
            width: 800px; height: 500px;
            align-items: flex-end;
        }

        /* 🪵 टेबल */
        .table {
            position: absolute; bottom: 0; left: -40px;
            width: 280px; height: 125px;
            background: #4e342e; border-top: 8px solid #5d4037;
            border-radius: 6px 6px 0 0; box-shadow: 5px 15px 30px rgba(0,0,0,0.6);
            z-index: 5;
        }

        /* 🐈 बिल्ली */
        .cozy-cat { position: absolute; bottom: 125px; left: 140px; font-size: 28px; z-index: 6; pointer-events: none; }

        /* 🧵 डोरी एनीमेशन */
        #light-trigger:checked ~ .container .pull-string { animation: swayCord 1s ease-in-out; }
        @keyframes swayCord {
            0% { transform: translateY(10px) rotate(0deg); }
            30% { transform: rotate(12deg); }
            60% { transform: rotate(-8deg); }
            80% { transform: rotate(4deg); }
            100% { transform: rotate(0deg); }
        }

        /* 💡 लैंप डिजाइन */
        .lamp-box {
            position: absolute; left: 20px; bottom: 125px;
            width: 150px; height: 320px;
            display: flex; flex-direction: column;
            align-items: center; z-index: 10;
        }
        .lamp-shade { width: 110px; height: 65px; background: #e74c3c; border-radius: 60px 60px 0 0; position: relative; box-shadow: inset 0 4px 0 rgba(255,255,255,0.25); }
        
        /* 🧵 यही वह डोरी है जिसपर क्लिक करना है */
        .pull-string {
            position: absolute; top: 65px; left: 35px; width: 4px; height: 100px;
            background: repeating-linear-gradient(0deg, #bdc3c7, #bdc3c7 3px, #7f8c8d 3px, #7f8c8d 6px);
            cursor: pointer; z-index: 15; transform-origin: top center; display: block; transition: transform 0.1s;
        }
        .pull-string::after { content: ''; position: absolute; bottom: -12px; left: -5px; width: 14px; height: 14px; background: #f1c40f; border-radius: 50%; box-shadow: 0 2px 6px rgba(0,0,0,0.4); }
        .pull-string:active { transform: translateY(12px); }
        
        .lamp-rod { width: 8px; height: 180px; background: #bdc3c7; }
        .lamp-bottom { width: 120px; height: 12px; background: #e74c3c; border-radius: 4px 4px 0 0; }

        /* 💡 रोशनी की किरण */
        .light-beam {
            position: absolute; top: 190px; left: 55px; width: 650px; height: 310px;
            clip-path: polygon(0% 0%, 12% 0%, 100% 50%, 100% 100%, 0% 100%);
            background: linear-gradient(110deg, rgba(255, 230, 100, 0.22) 0%, rgba(0,0,0,0) 85%);
            z-index: 2; pointer-events: none;
            opacity: var(--light-opacity);
            transition: opacity 0.4s ease;
        }

        /* 🔐 जादुई लॉगिन कार्ड (एनीमेशन के साथ प्रकट होने वाला) */
        .login-card {
            margin-left: auto; margin-bottom: 25px; width: 330px;
            background: rgba(25, 30, 41, 0.8); 
            border: 1px solid rgba(241, 196, 15, 0.4);
            backdrop-filter: blur(15px); padding: 35px; border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            z-index: 8; 
            
            /* 🎭 छुपाने और दिखाने का एनीमेशन कंट्रोल */
            visibility: var(--form-visibility);
            opacity: var(--form-opacity);
            transform: var(--form-transform);
            transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), visibility 0.6s;
        }

        .login-card h2 { margin: 0 0 20px 0; font-size: 28px; text-align: center; font-weight: 600; color: #fff; }
        .form-field { margin-bottom: 22px; }
        .form-field label { display: block; font-size: 13px; margin-bottom: 8px; font-weight: 500; color: #fff; }
        .input-wrapper { relative; }
        .input-wrapper span { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 16px; opacity: 0.6; }
        
        .form-field input {
            width: 100%; padding: 12px 12px 12px 38px; background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 8px; color: white; box-sizing: border-box; outline: none; font-size: 14px;
        }
        .form-field input:focus { border-color: #f1c40f; background: rgba(255, 255, 255, 0.12); }
        
        .submit-btn {
            width: 100%; padding: 14px; background: #f1c40f; border: none; border-radius: 8px;
            color: #111; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; margin-top: 10px;
            box-shadow: 0 5px 20px rgba(241, 196, 15, 0.4);
        }
        .submit-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }

        .message-box { margin-top: 15px; padding: 10px; border-radius: 6px; font-size: 14px; text-align: center; font-weight: 500; display: none; }
        .success-msg { background: rgba(46, 204, 113, 0.2); color: #2ecc71; border: 1px solid #2ecc71; }
        .error-msg { background: rgba(231, 76, 60, 0.2); color: #e74c3c; border: 1px solid #e74c3c; }
    </style>
</head>
<body>

    <!-- 🔮 मुख्य कंट्रोलर स्विच -->
    <input type="checkbox" id="light-trigger">

    <div class="container">
        
        <div class="table"></div>
        <div class="cozy-cat">🐈‍⬛💤</div>

        <!-- 💡 लैंप और डोरी -->
        <div class="lamp-box">
            <div class="lamp-shade">
                <label class="pull-string" for="light-trigger"></label>
            </div>
            <div class="lamp-rod"></div>
            <div class="lamp-bottom"></div>
        </div>

        <!-- रोशनी का बीम -->
        <div class="light-beam"></div>

        <!-- 🔐 लॉगिन कार्ड (जो शुरू में पूरी तरह गायब रहेगा) -->
        <div class="login-card">
            <h2>Welcome</h2>
            <form onsubmit="validateLogin(event)">
                <div class="form-field">
                    <label>Username</label>
                    <div class="input-wrapper">
                        <span style="position: absolute; left: 12px; top: 13px;">👤</span>
                        <input type="text" id="username" placeholder="Enter username" required>
                    </div>
                </div>
                <div class="form-field">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <span style="position: absolute; left: 12px; top: 13px;">🔒</span>
                        <input type="password" id="password" placeholder="Enter password" required>
                    </div>
                </div>
                <button type="submit" class="submit-btn">Log In</button>
            </form>
            <div id="message" class="message-box"></div>
        </div>

    </div>

    <script>
        function validateLogin(event) {
            event.preventDefault();
            const userField = document.getElementById('username').value;
            const passField = document.getElementById('password').value;
            const msgBox = document.getElementById('message');

            msgBox.style.display = "block";
            msgBox.className = "message-box"; 

            if (userField === "admin" && passField === "1234") {
                msgBox.innerText = "Login Successful! 🎉";
                msgBox.classList.add("success-msg");
            } else {
                msgBox.innerText = "Invalid Details! ❌";
                msgBox.classList.add("error-msg");
            }
        }
    </script>

</body>
</html>
